name: Build AutoPlay AI Mod

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Android32
            os: ubuntu-latest
            target: Android32
          - name: Android64
            os: ubuntu-latest
            target: Android64

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Build del mod
        uses: geode-sdk/build-geode-mod@main
        with:
          sdk: nightly
          target: ${{ matrix.config.target }}
          build-folder: build
          combine: true

  package:
    name: Package .geode
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Empaquetar
        uses: geode-sdk/build-geode-mod/combine@main
        id: build

      - uses: actions/upload-artifact@v4
        with:
          name: AutoPlayAI.geode
          path: ${{ steps.build.outputs.build-output }}
